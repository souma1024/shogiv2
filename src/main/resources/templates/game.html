<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{header.game_title}">将棋対局</title>
    <link rel="stylesheet" href="/css/game.css"/>
    <script type="module" src="/js/game/game.js" defer></script>
</head>

<body>
    
<div class="game-screen">
    <h2 th:text="#{game.title}">対局中</h2>

    <!-- 操作ボタン -->
    <div class="top-buttons">
        <form th:action="@{/review}" method="get">
            <button id="surrender" th:text="#{game.surrender}" type="submit">投了</button>
        </form>
    </div>

    <div id="game-layout">
        <!-- 持ち駒（後手） -->

        <div class="gote-field">
            <div class="gote-time-limit">
            </div>
            
            <div class="captured-pieces gote-hand">
                <div th:each="i : ${#numbers.sequence(7, 1, -1)}"
                    th:attr="id=${'capturedCell-' + goteId + '-' + i}"
                    class="captured-cell">
                </div>
            </div>
        </div>
        

        <!-- 将棋盤 -->
        <div id="shogi-board" class="board">
            <table class="board-table">
                <tbody>
                    <tr th:each="y : ${#numbers.sequence(0,8)}">
                        <td th:each="x : ${#numbers.sequence(0,8)}"
                            th:attr="id=${'cell-' + x + '-' + y}"
                            class="board-cell">
                        </td>
                    </tr>
                </tbody>    
            </table>
        </div>

        <!-- 持ち駒（先手） -->
        <div class="sente-field">
            <div class="captured-pieces sente-hand">
                <div th:each="i : ${#numbers.sequence(1,7)}"
                    th:attr="id=${'capturedCell-' + senteId + '-' + i}"
                    class="captured-cell">
                </div>
            </div>

            <div class="sente-time-limit">

            </div>
        </div>
        

    </div>
</div>

</body>
</html>
